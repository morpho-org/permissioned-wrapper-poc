[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true
verbosity = 2
evm_version = "cancun"
auto_detect_solc = true

remappings = [
    "@openzeppelin/contracts/=lib/morpho-blue/lib/openzeppelin-contracts/contracts/",
    "bundler3/=lib/bundler3/",
    "morpho-blue/=lib/morpho-blue/",
]

[profile.ci]
# CI profile inherits from default but ensures auto_detect_solc works
# bundler3 requires =0.8.28, so we need to ensure that version is available
auto_detect_solc = true
solc_version = "0.8.28"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
